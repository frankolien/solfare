name: solfare
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  bip39: ^1.0.6
  flutter_localizations:
    sdk: flutter
  intl: any
  bloc: ^8.1.3
  bs58: ^1.0.2
  ed25519_hd_key: ^2.3.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  http: ^1.2.0
  lottie: ^3.3.2
  video_player: ^2.10.1
  flutter_keyboard_visibility: ^6.0.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  solana: ^0.32.0+1
  fl_chart: ^1.2.0
  iconsax_flutter: ^1.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  webview_flutter: ^4.13.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/assets/images/
    - assets/assets/lottie/
    - assets/assets/videos/
    - assets/assets/videos/onboarding/
    - assets/assets/images/seeker/svg/
    - assets/assets/images/svg/
    - assets/assets/images/wallet_background/

  fonts:
    - family: FKGrotesk
      fonts:
        - asset: assets/fonts/FKGrotesk-Thin.ttf
          weight: 100
        - asset: assets/fonts/FKGrotesk-Light.ttf
          weight: 300
        - asset: assets/fonts/FKGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/FKGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/FKGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/FKGrotesk-Black.ttf
          weight: 900
    - family: FKGroteskSemiMono
      fonts:
        - asset: assets/fonts/FKGroteskSemiMono-Regular.otf
          weight: 400
        - asset: assets/fonts/FKGroteskSemiMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/FKGroteskSemiMono-Bold.otf
          weight: 700
