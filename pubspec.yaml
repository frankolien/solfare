name: solfare
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  bip39: ^1.0.6
  bloc: ^8.1.3
  bs58: ^1.0.2
  ed25519_hd_key: ^2.3.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  http: ^1.2.0
  lottie: ^3.3.2
  video_player: ^2.10.1
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
